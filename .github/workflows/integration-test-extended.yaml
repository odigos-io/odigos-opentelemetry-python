name: integration-test-extended

on:
  workflow_dispatch:
    inputs:
      ref:
        description: 'Branch name or tag to test'
        required: false
        type: string

jobs:
  integration-test-extended:
    runs-on: ubuntu-latest

    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.9", "3.10", "3.11", "3.12"]

    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          ref: ${{ inputs.ref || github.ref }}

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v4
        with:
          python-version: ${{ matrix.python-version }}

      - name: Install build tools
        run: python -m pip install --upgrade pip build

      - name: Run extended integration tests
        run: ./tests/integration/run_extended.sh

      - name: Upload traces artifact on failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: extended-integration-traces-py${{ matrix.python-version }}
          path: tests/integration/output/

      - name: Upload container logs on failure
        if: failure()
        run: |
          docker compose -f tests/integration/docker-compose.yaml logs > /tmp/integration-logs.txt 2>&1 || true
          echo "::group::Container logs"
          cat /tmp/integration-logs.txt
          echo "::endgroup::"

      - name: Upload logs artifact on failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: extended-integration-container-logs-py${{ matrix.python-version }}
          path: /tmp/integration-logs.txt
          if-no-files-found: ignore
