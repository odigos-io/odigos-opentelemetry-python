name: lint

on:
  pull_request:
    branches:
      - main
    types: [opened, synchronize, reopened, ready_for_review]
  workflow_dispatch:

jobs:
  ruff:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Run ruff lint
        uses: astral-sh/ruff-action@v3
        with:
          args: "check"

      - name: Run ruff format check
        uses: astral-sh/ruff-action@v3
        with:
          args: "format --check"

  ty:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Install uv
        run: curl -LsSf https://astral.sh/uv/0.11.2/install.sh | sh

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: "3.12"

      - name: Install project + dev tools
        run: uv sync --extra test --group dev --python 3.12

      - name: Run ty
        run: uv run --group dev ty check
