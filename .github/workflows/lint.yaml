name: lint

on:
  pull_request:
    branches:
      - main
    types: [opened, synchronize, reopened, ready_for_review]
  workflow_dispatch:

jobs:
  ruff:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Get changed Python files
        id: changed
        uses: tj-actions/changed-files@v45
        with:
          files: |
            **/*.py
          separator: " "

      - name: Run ruff lint
        if: steps.changed.outputs.any_changed == 'true'
        uses: astral-sh/ruff-action@v3
        with:
          args: "check"
          src: ${{ steps.changed.outputs.all_changed_files }}

      - name: Run ruff format check
        if: steps.changed.outputs.any_changed == 'true'
        uses: astral-sh/ruff-action@v3
        with:
          args: "format --check"
          src: ${{ steps.changed.outputs.all_changed_files }}

      - name: No Python files changed
        if: steps.changed.outputs.any_changed != 'true'
        run: echo "No Python files changed — skipping ruff."

  ty:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Get changed Python files
        id: changed
        uses: tj-actions/changed-files@v45
        with:
          files: |
            **/*.py
          separator: " "

      - name: Install uv
        if: steps.changed.outputs.any_changed == 'true'
        run: curl -LsSf https://astral.sh/uv/0.11.2/install.sh | sh

      - name: Set up Python
        if: steps.changed.outputs.any_changed == 'true'
        uses: actions/setup-python@v4
        with:
          python-version: "3.12"

      - name: Install project + dev tools
        if: steps.changed.outputs.any_changed == 'true'
        run: uv sync --extra test --group dev --python 3.12

      - name: Run ty
        if: steps.changed.outputs.any_changed == 'true'
        run: uv run --group dev ty check ${{ steps.changed.outputs.all_changed_files }}

      - name: No Python files changed
        if: steps.changed.outputs.any_changed != 'true'
        run: echo "No Python files changed — skipping ty."
