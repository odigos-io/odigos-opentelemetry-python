name: build

on:
  pull_request:
    branches:
      - main

jobs:
  build:
    runs-on: ubuntu-latest

    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.9", "3.10", "3.11", "3.12"]

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v4
        with:
          python-version: ${{ matrix.python-version }}

      - name: Install build tools
        run: |
          python -m pip install --upgrade pip
          pip install build

      - name: Install in editable mode
        run: pip install -e .

      - name: Smoke check imports
        run: |
          python -c "import initializer"
          python -c "import opamp"

      # Freeze the dependencies to scan for vulnerabilities
      - name: Freeze dependencies
        run: pip freeze > requirements.txt

      - name: Scan with critical-only failure
        uses: odigos-io/ci-core/vulnerabilities-scanner@main
        with:
          path: .
          severity-cutoff: "CRITICAL"
