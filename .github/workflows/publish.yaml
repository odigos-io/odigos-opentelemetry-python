name: Publish Python Package

on:
  push:
    tags:
      - 'v*'

env:
  ECR_REPO: public.ecr.aws/odigos/agents/python-community

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Check out the code
        uses: actions/checkout@v4

      - name: Install uv
        run: curl -LsSf https://astral.sh/uv/0.11.2/install.sh | sh

      - name: Set up Python
        run: uv python install 3.9

      - name: Verify version matches tag
        run: |
          # strip off the "refs/tags/" prefix, then the leading "v"
          # Tag has "v" (e.g. v0.1.66); pyproject.toml version must be without "v" (e.g. 0.1.66)
          TAG=${GITHUB_REF#refs/tags/}
          VERSION=${TAG#v}
          VERSION_ERE="${VERSION//./\\.}"
          echo "🔍 Checking pyproject.toml version == ${VERSION} (tag ${TAG})"
          if ! grep -qE "version\s*=\s*\"${VERSION_ERE}\"" pyproject.toml; then
            echo "❌ pyproject.toml version does not match tag (expected ${VERSION} from ${TAG})"
            exit 1
          fi
          echo "✅ pyproject.toml version ${VERSION} matches tag ${TAG}"

      - name: Set initializer version from tag (replace VERSION=development for PyPI)
        run: |
          TAG=${GITHUB_REF#refs/tags/}
          VERSION=${TAG#v}
          sed -i "s/VERSION = \"development\"/VERSION = \"${VERSION}\"/" initializer/version.py

      - name: Validate pyproject.toml instrumentation lines
        run: |
          for d in instrumentations/opentelemetry-instrumentation-*; do
            inst=${d#*/opentelemetry-instrumentation-}
            grep -q "odigos-opentelemetry-instrumentation-$inst" pyproject.toml \
              || { echo "❌ pyproject.toml missing odigos-opentelemetry-instrumentation-$inst"; exit 1; }
          done

      - name: Build all instrumentations
        run: make build-instrumentations

      - name: Publish patched instrumentations
        env:
          TWINE_USERNAME: "__token__"
          TWINE_PASSWORD: ${{ secrets.PYPI_API_TOKEN }}
        run: |
          # uv build in a workspace outputs all wheels to root dist/
          # Using --skip-existing in order to skip already uploaded instrumentation,
          # In order to overwrite, a package needs to be removed manually from PyPI
          uvx twine upload --skip-existing --non-interactive dist/odigos_opentelemetry_instrumentation_*

      - name: Build the package
        run: uv build

      - name: Publish to PyPI
        env:
          TWINE_USERNAME: "__token__"
          TWINE_PASSWORD: ${{ secrets.PYPI_API_TOKEN }}
        run: uvx twine upload --non-interactive dist/odigos_opentelemetry_python-*

  docker-release:
    runs-on: ubuntu-latest
    # This runs after the release for the pypi has succeeded, we can simply install and run with the image build.
    needs: build
    permissions:
      contents: read
      id-token: write

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Validate agent/pyproject.toml version and odigos-opentelemetry-python
        run: |
          TAG=${GITHUB_REF#refs/tags/}
          VERSION=${TAG#v}
          echo "🔍 Checking agent/pyproject.toml version == ${VERSION} (from tag ${TAG})"
          if ! grep -qE "version\s*=\s*\"${VERSION}\"" agent/pyproject.toml; then
            echo "❌ agent/pyproject.toml version does not match tag (${TAG})"
            exit 1
          fi
          if ! grep -q "odigos-opentelemetry-python == ${VERSION}" agent/pyproject.toml; then
            echo "❌ agent/pyproject.toml odigos-opentelemetry-python dependency version does not match tag (${TAG})"
            exit 1
          fi
          echo "✅ agent/pyproject.toml version and odigos-opentelemetry-python==${VERSION} are correct"

      - name: Wait for PyPI availability
        # The Docker build resolves dependencies from PyPI, but CDN propagation
        # can lag behind the upload. Poll until the package is available.
        run: |
          TAG=${GITHUB_REF#refs/tags/}
          VERSION=${TAG#v}
          echo "⏳ Waiting for odigos-opentelemetry-python==${VERSION} on PyPI..."
          for i in $(seq 1 12); do
            if curl -sf "https://pypi.org/pypi/odigos-opentelemetry-python/${VERSION}/json" > /dev/null; then
              echo "✅ Package available on PyPI"
              exit 0
            fi
            echo "  Not yet available, retrying in 5s... (attempt $i/12)"
            sleep 5
          done
          echo "❌ Package not available on PyPI after 60s"
          exit 1

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: arn:aws:iam::${{ secrets.AWS_ACCOUNT_ID }}:role/github-actions-ecr-upload
          aws-region: 'us-east-1'

      - name: Log in to Amazon ECR
        run: |
          aws ecr-public get-login-password --region us-east-1 \
          | docker login --username AWS --password-stdin public.ecr.aws

      - name: Build and push Docker image
        uses: docker/build-push-action@v6
        with:
          context: .
          platforms: linux/amd64,linux/arm64
          file: release.Dockerfile
          push: true
          build-args: TAG=${{ github.ref_name }}
          tags: ${{ env.ECR_REPO }}:${{ github.ref_name }},${{ env.ECR_REPO }}:latest

      - name: Notify Slack
        uses: odigos-io/ci-core/.github/actions/slack-release-notification@main
        with:
          webhook-url: ${{ secrets.ODIGOS_RELEASE_STATUS_WEBHOOK_URL }}
          success-description: "Published a new release of OpenTelemetry Python Community Agent"
          failure-description: "ERROR: Failed to publish a new release of OpenTelemetry Python Community Agent"
          tag: ${{ github.ref_name }}
