name: Publish Python Package

on:
  push:
    tags:
      - 'v*'

env:
  ECR_REPO: public.ecr.aws/odigos/agents/python-community

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Check out the code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.8'

      - name: Install build tools
        run: |
          pip install build twine

      - name: Verify version matches tag
        run: |
          # strip off the “refs/tags/” prefix, then the leading “v”
          TAG=${GITHUB_REF#refs/tags/}
          VERSION=${TAG#v}
          echo "🔍 Checking setup.py version == ${VERSION} (from tag ${TAG})"
          if ! grep -qE "version\s*=\s*['\"]${VERSION}['\"]" setup.py; then
            echo "❌ setup.py version does not match tag (${TAG})"
            exit 1
          fi
          echo "✅ setup.py version matches tag (${TAG})"

      - name: Set initializer version from tag
        run: |
          TAG=${GITHUB_REF#refs/tags/}
          VERSION=${TAG#v}
          echo "VERSION = \"${VERSION}\"" > initializer/version.py
          echo "✅ Set initializer/version.py to ${VERSION}"

      - name: Validate setup.py instrumentation lines
        run: |
          for d in instrumentations/opentelemetry-instrumentation-*; do
            inst=${d#*/opentelemetry-instrumentation-}
            grep -q "odigos-opentelemetry-instrumentation-$inst" setup.py \
              || { echo "❌ setup.py missing odigos-opentelemetry-instrumentation-$inst"; exit 1; }
          done

      - name: Build all instrumentations
        run: make build-instrumentations

      - name: Publish patched instrumentations
        env:
          TWINE_USERNAME: "__token__"
          TWINE_PASSWORD: ${{ secrets.PYPI_API_TOKEN }}
        run: |
          for d in instrumentations/opentelemetry-instrumentation-*; do
            echo "➡️ Publishing $(basename $d)"
            # Using --skip-existing in order to skip already uploaded instrumentation,
            # In order to overwrite, a package needs to be removed manually from the PyPi
            twine upload --skip-existing --non-interactive "$d/dist/*"
          done

      - name: Build the package
        run: |
          python -m build

      - name: Publish to PyPI
        env:
          TWINE_USERNAME: "__token__"
          TWINE_PASSWORD: ${{ secrets.PYPI_API_TOKEN }}
        run: twine upload --non-interactive dist/*

  docker-release:
    runs-on: ubuntu-latest
    needs: build
    permissions:
      contents: read
      id-token: write

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: arn:aws:iam::${{ secrets.AWS_ACCOUNT_ID }}:role/github-actions-ecr-upload
          aws-region: 'us-east-1'

      - name: Log in to Amazon ECR
        run: |
          aws ecr-public get-login-password --region us-east-1 \
          | docker login --username AWS --password-stdin public.ecr.aws

      - name: Build and push Docker image
        uses: docker/build-push-action@v6
        with:
          context: .
          platforms: linux/amd64,linux/arm64
          file: release.Dockerfile
          push: true
          build-args: TAG=${{ github.ref_name }}
          tags: ${{ env.ECR_REPO }}:${{ github.ref_name }},${{ env.ECR_REPO }}:latest

      - name: Notify Slack
        uses: odigos-io/ci-core/.github/actions/slack-release-notification@main
        with:
          webhook-url: ${{ secrets.ODIGOS_RELEASE_STATUS_WEBHOOK_URL }}
          success-description: "Published a new release of OpenTelemetry Python Community Agent"
          failure-description: "ERROR: Failed to publish a new release of OpenTelemetry Python Community Agent"
          tag: ${{ github.ref_name }}
